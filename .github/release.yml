changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "🧰 Maintenance & Updates"
      labels:
        - "chore"
        - "documentation"
  replacements:
    - search: ".*"
      replace: "$0"