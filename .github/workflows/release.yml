name: Deploy Lotus Pond Reader

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Android Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'android/**'

      - name: Set up JDK 17
        if: steps.filter.outputs.android == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradlew
        if: steps.filter.outputs.android == 'true'
        run: chmod +x android/gradlew

      - name: Build APK
        if: steps.filter.outputs.android == 'true'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        if: steps.filter.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lotus-pond-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Web Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'web/**'

      - name: Pushing Web Assets to Website Repo
        if: steps.filter.outputs.web == 'true'
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.WEB_DEPLOY_TOKEN }}
        with:
          source-directory: 'web'
          destination-github-username: 'sanbeiji'
          destination-repository-name: 'sanbeiji.github.io'
          target-directory: 'docs/lotus'
          user-email: '30529+sanbeiji@users.noreply.github.com'
          target-branch: 'main'

  create-release:
    needs: [build-android, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: lotus-pond-apk
          path: ./downloaded-apk
        continue-on-error: true

      - name: Create Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./downloaded-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}