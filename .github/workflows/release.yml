name: Deploy Lotus Pond Reader

on:
  push:
    tags:
      - 'v*' # Triggers the workflow whenever you push a tag starting with 'v' (e.g., v1.0.0)

jobs:
  # JOB 1: Build the Android App if /android has changes
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Smart Check: Did files in /android change?
      - name: Check for Android Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'android/**'

      - name: Set up JDK 17
        if: steps.filter.outputs.android == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradlew
        if: steps.filter.outputs.android == 'true'
        run: chmod +x android/gradlew

      # Compiles the APK
      - name: Build APK
        if: steps.filter.outputs.android == 'true'
        run: |
          cd android
          ./gradlew assembleDebug

      # Upload the built APK to a temporary cloud staging zone
      - name: Upload APK Artifact
        if: steps.filter.outputs.android == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lotus-pond-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # JOB 2: Deploy Web Files if /web has changes
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Smart Check: Did files in /web change?
      - name: Check for Web Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'web/**'

      # Deploy directly to your website repository using the security token
      - name: Pushing Web Assets to Personal Website Repo
        if: steps.filter.outputs.web == 'true'
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.WEB_DEPLOY_TOKEN }}
        with:
          source-directory: 'web'
          destination-github-username: 'sanbeiji'
          destination-repository-name: 'sanbeiji.github.io'
          target-directory: 'lotus-pond'
          user-email: '30529+sanbeiji@users.noreply.github.com'
          target-branch: 'main'

  # JOB 3: Generate the official GitHub Release
  create-release:
    needs: [build-android, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download the APK generated in Job 1 (if it exists)
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: lotus-pond-apk
          path: ./downloaded-apk
        continue-on-error: true # Safe fail if Android wasn't built

      # Creates the release, groups the notes, and attaches the APK binary
      - name: Create Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./downloaded-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}