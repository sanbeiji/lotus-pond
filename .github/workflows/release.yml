name: Deploy Lotus Pond Reader

on:
  push:
    tags:
      - 'v*'

jobs:
  # JOB 1: Build the Android App (Forced)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lotus-pond-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # JOB 2: Deploy Web Files (Forced & Path Corrected)
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pushing Web Assets to Website Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.WEB_DEPLOY_TOKEN }}
        with:
          source-directory: 'web'
          destination-github-username: 'sanbeiji'
          destination-repository-name: 'sanbeiji.github.io'
          # UPDATED: Pointing exactly to your docs/lotus folder
          target-directory: 'docs/lotus'
          user-email: '30529+sanbeiji@users.noreply.github.com'
          target-branch: 'main'

  # JOB 3: Generate the official GitHub Release
  create-release:
    needs: [build-android, deploy-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: lotus-pond-apk
          path: ./downloaded-apk
        continue-on-error: true

      - name: Create Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./downloaded-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}